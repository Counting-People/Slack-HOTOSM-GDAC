name: GDACS Alert Check

on:
  schedule:
    - cron: '1 0 * * *'  # once per day at a minute after midnight UTC
  workflow_dispatch:       # manual trigger from GitHub UI

permissions:
  contents: write  # allows the workflow to commit the state file back to the repo

jobs:
  check-alerts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run GDACS alert check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python gdacs-slack.py

      - name: Commit updated state file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_event_id.txt
          git diff --cached --quiet || git commit -m "chore: update last event ID [skip ci]"
          git push
