name: GDACS Alert Notifier

on:
  schedule:
    - cron: "1 0 * * *"   # 00:01 UTC every night

  workflow_dispatch:        # Manual trigger from GitHub Actions UI
    inputs:
      initial_run:
        description: "Set to 'true' to backfill all orange/red alerts from 2026-01-01"
        required: false
        default: "false"

permissions:
  contents: write           # Required to commit posted_events.json back to the repo

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run GDACS alert notifier
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          INITIAL_RUN: ${{ github.event.inputs.initial_run || 'false' }}
        run: python gdacs-slack.py

      - name: Commit updated posted_events.json
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_events.json
          git diff --staged --quiet || git commit -m "chore: update posted_events.json [skip ci]"
          git push
